server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: doce-gestao-api

  datasource:
    url: jdbc:postgresql://localhost:5432/doce_gestao
    username: postgres
    password: 3636
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /v3/api-docs

security:
  jwt:
    secret: 1234567890123456789012345678901234567890123456789012345678901234
    access-token-expiration-minutes: 15